# App Store Connect — App Privacy ("privacy nutrition label") questionnaire.
#
# STATUS: LIVE-VALIDATED against the real ASC wizard (FD Sundhed, Apple ID
# 6792116588) on 2026-07-17 via the LOCAL cardmem daemon (F112). Every locator
# below is the real one discovered by driving the form, not a best-guess.
#
# WHAT IS REUSABLE (the flow) vs. WHAT IS PER-APP (the declaration):
#   - The steps/locators below ARE the flow — reuse verbatim for ANY app's
#     App Privacy form. Apple's wizard is identical across apps.
#   - The PER-APP declaration is: (a) --base-url (the app's privacy URL),
#     (b) --data privacy_policy_url=..., and (c) the SET of data-type blocks in
#     `select-data-types` + the per-type `configure-*` steps (which types, and
#     each type's linked=Yes/No). Swap those to declare a different app.
#     A data type's purpose here is always "App Functionality" and tracking is
#     "No" — FD Sundhed collects nothing for ads/analytics/tracking.
#
# THE 9 DATA TYPES DECLARED FOR FD SUNDHED (purpose=App Functionality, tracking=No):
#   Name, Email Address, Phone Number, Health, Photos or Videos, User ID,
#   Device ID  -> LINKED to identity
#   Crash Data -> NOT linked (Diagnostics, no user-id on events)
#   Other Data Types (Danish CPR, AES-256-GCM, shared only w/ booking system) -> LINKED
#
# v1 STOPS BEFORE "Publish": this schema fills + saves the declaration as a
# DRAFT and asserts the Publish button is present. It NEVER clicks Publish — the
# public, version-releasing step is owner-gated (F002). Apple releases the saved
# label with the app's next version submission.
#
# ENGINE NOTE: the per-type sub-flow (purpose -> linked -> 2 tracking-info
# interstitials -> tracking) is a DYNAMIC branch repeated per selected type.
# Full one-shot engine replay needs Lens branching support (F001.10 G3 gap);
# until then the daemon drives it step-wise (as this run did). The blocks below
# are the faithful, expanded linear record of that flow.
#
# Run (local daemon, authed ASC session on the same Mac/IP as login):
#   bun run src/run.ts schemas/app-store-connect.app-privacy.yaml --daemon \
#     --base-url "https://appstoreconnect.apple.com/apps/6792116588/distribution/privacy" \
#     --state /Users/cb/.lens/state/asc-session.json \
#     --data privacy_policy_url="https://sundhed.fdaalborg.dk/privacy"
form: app-store-connect/app-privacy
mutates: true
# Human-like pacing between fields (F001.9) — App Privacy is a long wizard.
pacing: { min_ms: 350, max_ms: 900 }
steps:
  - id: privacy-policy-url
    waitFor: 1500
    fields:
      - name: open-privacy-policy-editor
        action: click
        locator: { role: "button", text: "Edit", nth: 0 }
      - name: privacy-policy-url
        action: fill
        locator: { css: "input[name=privacyPolicyUrl]" }
        value: "{{ privacy_policy_url }}"
      - name: save-privacy-policy
        action: click
        locator: { role: "button", text: "Save" }
  - id: data-collection-start
    waitFor: 1500
    fields:
      - name: get-started
        action: click
        locator: { role: "button", text: "Get Started" }
      - name: collect-data-yes
        action: click
        locator: { role: "radio", text: "Yes, we collect data" }
      - name: collect-next
        action: click
        locator: { role: "button", text: "Next" }
  - id: select-data-types
    waitFor: 1200
    fields:
      - name: type-name
        action: click
        locator: { role: "checkbox", text: "Name", exact: true }
      - name: type-email-address
        action: click
        locator: { role: "checkbox", text: "Email Address", exact: true }
      - name: type-phone-number
        action: click
        locator: { role: "checkbox", text: "Phone Number", exact: true }
      - name: type-health
        action: click
        locator: { role: "checkbox", text: "Health", exact: true }
      - name: type-photos-or-videos
        action: click
        locator: { role: "checkbox", text: "Photos or Videos", exact: true }
      - name: type-user-id
        action: click
        locator: { role: "checkbox", text: "User ID", exact: true }
      - name: type-device-id
        action: click
        locator: { role: "checkbox", text: "Device ID", exact: true }
      - name: type-crash-data
        action: click
        locator: { role: "checkbox", text: "Crash Data", exact: true }
      - name: type-other-data-types
        action: click
        locator: { role: "checkbox", text: "Other Data Types", exact: true }
      - name: save-types
        action: click
        locator: { role: "button", text: "Save" }
      - name: ack-additional-setup
        action: click
        locator: { role: "button", text: "OK" }
  - id: configure-name
