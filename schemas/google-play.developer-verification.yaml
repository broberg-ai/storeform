# DRAFT — Google Play Console "Developer verification" (TASK 2, net.fdsport).
#
# READ-ONLY. mutates:false — denne opskrift ÆNDRER intet. Den bekræfter blot at
# net.fdsport (app-id 4974482900370708926) fremgår som registreret/verificeret
# under kontoens Developer-Verification-side. Ingen fill, intet klik på noget der
# gemmer. Dette er den ideelle FØRSTE rigtige Google-kørsel (nul risiko) — jf.
# den sikre sekvens aftalt med fds (#17662/#17665).
#
# ⚠️ Locators er BEST-GUESS accessible names — Play Console er React/Material uden
# stabile data-testid, så self-heal via role/text ER strategien. Valider + tighten
# mod den RIGTIGE side (F001.6 AC1) med Christians authede session + den lokale
# daemon. `resolved_via` i rapporten viser hvilket lag der holdt.
#
# Kør (når en authed Google Play-session findes):
#   bun run src/run.ts schemas/google-play.developer-verification.yaml --daemon \
#     --state gp-session.json \
#     --base-url "https://play.google.com/console/u/0/developers/4851438727803482747"
# (Verifikations-siden ligger på konto-niveau; navigér på label — nyere side.)
form: google-play/developer-verification
mutates: false
steps:
  - id: verify-registration
    fields:
      # Bevis på at vi er landet på verifikations-siden (heading-laget først).
      - name: verification-heading
        action: expectVisible
        locator: { role: heading, text: "Developer verification" }
      # Kernen: pakke-navnet net.fdsport skal fremgå = appen er registreret.
      - name: fdsport-package-listed
        action: expectVisible
        locator: { text: "net.fdsport" }
      # Best-guess status-markør. Rammer den ikke, rapporterer read-only-kørslen
      # det (graceful) — så ved vi status ikke er "Verified" og eskalerer manuelt.
      - name: verified-status-present
        action: expectVisible
        locator: { role: status, text: "Verified" }
