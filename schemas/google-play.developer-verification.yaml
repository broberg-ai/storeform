# Google Play Console "Android-udviklerverificering" (Developer verification) VERIFY.
# net.fdsport (FD Sport), read-only. VERIFIED LIVE 2026-07-16 against the real form.
#
# READ-ONLY (mutates:false): asserts on the account home that all apps (incl.
# net.fdsport) are registered for Android developer verification. Changes nothing.
# This is the zero-risk check we ran FIRST.
#
# ── LIVE FINDINGS ───────────────────────────────────────────────────────────────
# The Console renders in DANISH for this account. The account home shows a banner:
#   "Alle dine apps er blevet registreret for at opfylde kravene til
#    Android-udviklerverificering."
# and net.fdsport's own app dashboard shows a green verified check next to the
# package name. Asserting the (Danish) banner text is the stable read-only signal.
# (The banner has a "Luk" dismiss button — if dismissed, re-check via the
# "Android-udviklerverificering" sidebar page instead.)
#
# Run (authed Play Console session via cardmem /lens/capture-session):
#   bun run src/run.ts schemas/google-play.developer-verification.yaml --daemon \
#     --state /Users/cb/.lens/state/gp-session.json \
#     --base-url "https://play.google.com/console/u/0/developers/4851438727803482747"
form: google-play/developer-verification
mutates: false
pacing: { min_ms: 12000, max_ms: 12000 }
steps:
  - id: verify-registration
    fields:
      # Danish registration banner on the account home = all apps registered.
      - name: apps-registered-banner
        action: expectVisible
        locator: { text: "registreret for at opfylde kravene til Android-udviklerverificering" }
